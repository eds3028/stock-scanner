services:
  # ── Scanner ──────────────────────────────────────────────────────────────────
  # Runs the nightly scheduler (and an immediate scan on first boot if DB is
  # empty).  No web port.  All data-provider keys live here.
  scanner:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: stocks-scanner
    command: python scheduler.py
    restart: unless-stopped
    volumes:
      - /opt/stacks/stocks/data:/data
    environment:
      TZ: ${TZ:-Australia/Perth}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FMP_API_KEY: ${FMP_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      UNIVERSE: ${UNIVERSE:-asx200}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}

  # ── Dashboard ────────────────────────────────────────────────────────────────
  # Read-only Streamlit UI.  Restarting or redeploying the dashboard never
  # interrupts an in-progress scan.
  dashboard:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: stocks-dashboard
    command: >
      streamlit run dashboard.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
        --browser.gatherUsageStats=false
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - /opt/stacks/stocks/data:/data
    environment:
      TZ: ${TZ:-Australia/Perth}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FMP_API_KEY: ${FMP_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      UNIVERSE: ${UNIVERSE:-asx200}
    depends_on:
      - scanner
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
