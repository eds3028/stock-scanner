# Stock scanner universe configuration.
#
# Controls which tickers the nightly scanner processes.
# Override the active universe at runtime without editing this file:
#
#   UNIVERSE=asx20 docker compose up  (or set UNIVERSE in .env)
#
# Available built-in universes: asx20, asx200, watchlist
# Add your own by copying the watchlist block and filling in tickers.

active: asx200

universes:

  # ── ASX 20 ──────────────────────────────────────────────────────────────────
  asx20:
    name: "ASX 20"
    description: "Australia's 20 largest companies by market capitalisation"
